  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UTM Link Generator</title>
  <meta name="description" content="Generate UTM tracking links with automatic normalization. Free, browser-based, no sign-up." />
  <link rel="icon" href="toolbox-solid.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styles.css" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="UTM Link Generator — Marketing Tools" />
  <meta property="og:image" content="https://annielovelock.github.io/marketing-tools/og/og-utm.png" />

</head>

<body class="page-utm">
  <nav class="siteNav">
    <div class="navInner">
      <a class="navBrand" href="index.html" aria-label="Home"><i class="fa-solid fa-house"></i></a>
      <button class="navToggle" type="button" aria-expanded="false" aria-controls="navLinks">Menu</button>
      <div class="navLinks" id="navLinks">
        <a href="utmlinkgenerator.html" aria-current="page">UTM Generator</a>
        <a href="qrcodegenerator.html">QR Code</a>
        <a href="charactercopychecker.html">Copy Checker</a>
        <a href="wordcharcounter.html">Word Counter</a>
        <a href="aptitles.html">AP Title Caps</a>
        <a href="symbollibrary.html">Symbol Library</a>
        <a href="serppreview.html">SERP Preview</a>
        <a href="colorcontrast.html">Contrast Checker</a>
      </div>
    </div>
  </nav>
  <main class="wrap">
    <h1>UTM Link Generator</h1>
    <p>Build clean tracking links with normalized UTMs.</p>

    <div class="card">
      <label>
        Destination URL <span class="req">(required)</span>
        <span class="tip" tabindex="0" data-tip="The final page users should land on when they click the link.">i</span>
      </label>
      <input id="dest" type="url" placeholder="https://example.com/page" />

      <label>
        Source <span class="pill">optional</span>
        <span class="tip" tabindex="0"
          data-tip="Identifies the referring website, platform, or partner sending the traffic.">i</span>
      </label>
      <input id="source" type="text" placeholder="partner_name" />

      <label for="mediumSelect">
        Medium <span class="pill">optional</span>
        <span class="tip" tabindex="0"
          data-tip="Describes how the traffic arrived, such as newsletter, sponsored_content, or display.">i</span>
      </label>
      <select id="mediumSelect">
        <option value="" disabled selected>Select a medium</option>
        <option value="newsletter">newsletter</option>
        <option value="sponsored_content">sponsored_content</option>
        <option value="display">display</option>
        <option value="paid_social">paid_social</option>
        <option value="organic_social">organic_social</option>
        <option value="affiliate">affiliate</option>
        <option value="partner">partner</option>
        <option value="referral">referral</option>
        <option value="cpc">cpc</option>
        <option value="video">video</option>
        <option value="__custom__">Custom…</option>
      </select>

      <input id="mediumCustom" type="text" placeholder="custom_medium" style="display:none;" />

      <label>
        Campaign <span class="pill">optional</span>
        <span class="tip" tabindex="0"
          data-tip="Optional. Use to identify traffic tied to specific advertising campaigns.">i</span>
      </label>
      <input id="campaign" type="text" placeholder="spring_launch" />

      <label>
        Term <span class="pill">optional</span>
        <span class="tip" tabindex="0"
          data-tip="Used for paid search. Use term to note the keywords for this ad.">i</span>
      </label>
      <input id="term" type="text" placeholder="keyword" />

      <label>
        Size / Description (utm_content) <span class="pill">optional</span>
        <span class="tip" tabindex="0"
          data-tip="Used for A/B testing and content-targeted ads. Differentiate ads or links that point to the same URL.">i</span>
      </label>
      <input id="content" type="text" placeholder="300x250" />

      <div class="mini">All inputs are auto-normalized (lowercase, underscores, safe characters).</div>

      <div class="actions">
        <button class="primary" id="copyBtn" disabled>Copy link</button>
        <button id="clearBtn">Clear</button>
      </div>

      <div class="out" id="output"></div>
      <div class="error" id="error"></div>

    </div>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const dest = $("dest");
    const source = $("source");
    const mediumSelect = $("mediumSelect");
    const mediumCustom = $("mediumCustom");
    const campaign = $("campaign");
    const term = $("term");
    const content = $("content");
    const output = $("output");
    const error = $("error");
    const copyBtn = $("copyBtn");
    const clearBtn = $("clearBtn");

    function normalize(v) {
      return (v || "")
        .trim()
        .toLowerCase()
        .replace(/&/g, " and ")
        .replace(/[\s-]+/g, "_")
        .replace(/[^a-z0-9_]/g, "")
        .replace(/_+/g, "_")
        .replace(/^_+|_+$/g, "");
    }

    function getMedium() {
      return mediumSelect.value === "__custom__" ?
        mediumCustom.value :
        mediumSelect.value;
    }

    function validUrl(v) {
      try {
        new URL(v);
        return true;
      } catch {
        return false;
      }
    }

    function ensureProtocol(v) {
      v = v.trim();
      if (!v) return v;
      if (!/^https?:\/\//i.test(v)) v = "https://" + v;
      return v;
    }

    function build() {
      error.textContent = "";
      output.textContent = "";
      copyBtn.disabled = true;
      const d = ensureProtocol(dest.value);
      if (!d) return;
      if (!validUrl(d)) {
        error.textContent = "Invalid URL.";
        return;
      }
      const s = normalize(source.value);
      const m = normalize(getMedium());
      const c = normalize(campaign.value);
      const t = normalize(term.value);
      const co = normalize(content.value);
      const url = new URL(d);
      if (s) url.searchParams.set("utm_source", s);
      if (m) url.searchParams.set("utm_medium", m);
      if (c) url.searchParams.set("utm_campaign", c);
      if (t) url.searchParams.set("utm_term", t);
      if (co) url.searchParams.set("utm_content", co);
      const finalUrl = url.toString();
      output.textContent = finalUrl;
      copyBtn.disabled = false;
    }
    // Rebuild on input
    ["input", "change"].forEach(evt => {
      dest.addEventListener(evt, build);
      source.addEventListener(evt, build);
      campaign.addEventListener(evt, build);
      term.addEventListener(evt, build);
      content.addEventListener(evt, build);
      mediumCustom.addEventListener(evt, build);
    });
    mediumSelect.addEventListener("change", () => {
      const isCustom = mediumSelect.value === "__custom__";
      mediumCustom.style.display = isCustom ? "block" : "none";
      mediumCustom.value = "";
      build();
      if (isCustom) mediumCustom.focus();
    });
    copyBtn.addEventListener("click", async () => {
      if (!output.textContent) return;
      try {
        await navigator.clipboard.writeText(output.textContent);
        copyBtn.textContent = "Copied";
        setTimeout(() => (copyBtn.textContent = "Copy link"), 1200);
      } catch {
        error.textContent = "Copy failed. Select the link and copy manually.";
      }
    });
    clearBtn.addEventListener("click", () => {
      dest.value = "";
      source.value = "";
      mediumSelect.value = "";
      mediumCustom.value = "";
      mediumCustom.style.display = "none";
      campaign.value = "";
      term.value = "";
      content.value = "";
      output.textContent = "";
      error.textContent = "";
      copyBtn.disabled = true;
      copyBtn.textContent = "Copy link";
      dest.focus();
    });
    build();
  </script>
  <script src="script.js"></script>

  <footer class="siteFooter"><small>Last Updated: 4/2/26</small></footer>
</body>

</html>
